services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: llm_handbook
      POSTGRES_USER: llm
      POSTGRES_PASSWORD: llm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm -d llm_handbook"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://llm:llm@db:5432/llm_handbook
      JWT_SECRET_KEY: dev-secret
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
